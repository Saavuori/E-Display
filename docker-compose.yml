services:
  backend:
    image: ghcr.io/saavuori/e-display:latest
    container_name: hsl-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json
      - ./pic:/app/pic

  frontend:
    image: ghcr.io/saavuori/e-display-frontend:latest
    build: ./web-ui
    container_name: hsl-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  display:
    image: ghcr.io/saavuori/e-display:latest
    container_name: hsl-display
    restart: unless-stopped
    # Privileged mode is often required for direct hardware access on Pi
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
      - /dev/spidev0.0:/dev/spidev0.0
      - /dev/spidev0.1:/dev/spidev0.1
    volumes:
      - ./config.json:/app/config.json
      - ./pic:/app/pic
    command: python display.py
